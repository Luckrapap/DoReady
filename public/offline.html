<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sin conexión - DoReady</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --secondary-text: #6b7280;
            --brand-color: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #f9fafb;
                --secondary-text: #9ca3af;
                --brand-color: #ffffff;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 80%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        svg {
            width: 120px;
            height: 120px;
            fill: var(--text-color);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .retry-hint {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--secondary-text);
        }

        .retry-button {
            margin-top: 2rem;
            background-color: var(--brand-color);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .retry-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body onclick="retry()">
    <div class="container">
        <div class="icon-container">
            <!-- Icono de WiFi con exclamación (recreado según referencia) -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm.75-5.25h-1.5v-6h1.5v6ZM3.53 7.56a12 12 0 0 1 16.94 0l-1.06 1.06a10.5 10.5 0 0 0-14.82 0L3.53 7.56Zm3.18 3.18a7.5 7.5 0 0 1 10.58 0l-1.06 1.06a6 6 0 0 0-8.46 0l-1.06-1.06Z" />
            </svg>
        </div>
        <h1>Ups, algo salió mal</h1>
        <p class="retry-hint">Pulsa para volver a intentar</p>
        <button class="retry-button" onclick="retry()">Reintentar</button>
    </div>

    <script>
        function retry() {
            // Recargar la URL original (la BridgeActivity se encarga del resto)
            try {
                window.location.replace("https://do-ready.vercel.app/");
            } catch (e) {
                window.location.reload();
            }
        }
    </script>
</body>
</html>
